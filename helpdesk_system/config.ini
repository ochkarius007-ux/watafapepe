[TELEGRAM]
# Токен для Telegram бота (получить у @BotFather)
bot_token = YOUR_TELEGRAM_BOT_TOKEN_HERE

[MAX]
# Токен для MAX бота (получить в админ-панели MAX)
bot_token = YOUR_MAX_BOT_TOKEN_HERE
# URL API платформы MAX
api_url = https://api.max-platform.ru

[FLASK]
# Секретный ключ для Flask приложения
secret_key = your-secret-key-change-this-in-production
# Хост и порт для запуска
host = 0.0.0.0
port = 5000
debug = True

[DATABASE]
# Путь к базе данных (абсолютный путь для корректной работы)
db_path = /workspace/helpdesk_system/instance/helpdesk.db
